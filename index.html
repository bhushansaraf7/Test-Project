<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My HTML Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #4b6cb7, #182848);
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
            max-width: 520px;
            width: 100%;
        }
        .container h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        .container p {
            margin: 0.75rem 0 1.5rem;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            text-decoration: none;
            color: #182848;
            background: #ffffff;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            background: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Test Project</h1>
        <p>This is a simple HTML starter page with responsive styling. Use it as a base for your next web project.</p>
        <a class="button" href="#">Get Started</a>
    </div>
</body>
    
</html>
